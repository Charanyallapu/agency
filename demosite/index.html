<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="resturent — Explore our curated digital menu. A visual lookbook of handcrafted dishes, biryanis, beverages, and desserts.">
    <meta name="theme-color" content="#1A3C2A">
    <title>resturent · Digital Menu</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Sticky Top Header & Nav -->
    <header class="sticky-header">
        <div class="header-brand">
            <h1 class="restaurant-name">resturent</h1>
        </div>

        <!-- Horizontally scrollable category pills -->
        <nav class="category-nav" aria-label="Menu categories">
            <button class="category-pill active" data-category="Starters">Starters</button>
            <button class="category-pill" data-category="Mains">Mains</button>
            <button class="category-pill" data-category="Drinks">Drinks</button>
            <button class="category-pill" data-category="Desserts">Desserts</button>
        </nav>
    </header>

    <!-- Main Menu Grid -->
    <main id="menu-content" class="menu-content" role="main">
        <!-- JS renders menu sections and cards dynamically -->
    </main>

    <!-- Detail Overlay (hidden by default) -->
    <div id="detail-overlay" class="detail-overlay hidden" role="dialog" aria-modal="true" aria-label="Dish details">
        <button id="close-detail-btn" class="close-btn" aria-label="Close details">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>

        <div class="drag-handle-bar"></div>

        <div class="detail-hero">
            <img id="detail-hero-image" class="detail-hero-image" src="" alt="">
        </div>

        <div id="detail-content" class="detail-content">
            <!-- JS populates full detail content dynamically -->
        </div>
    </div>

    <script src="js/menu-data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
